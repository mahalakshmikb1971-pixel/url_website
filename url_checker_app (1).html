<!DOCTYPE html>
<html>
<head>
    <title>URL Checker App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            margin-left: 10px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>URL Checker App</h1>

    <input type="text" id="url" placeholder="Enter URL here">
    <button onclick="checkURL()">Check</button>

    <div id="result"></div>

    <script>
        function checkURL() {
            let url = document.getElementById("url").value;

            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "http://" + url;
            }

            try {
                new URL(url);

                document.getElementById("result").innerHTML =
                    "✅ Valid URL - Click below to open<br><br>" +
                    "<a href='" + url + "' target='_blank'>Open Website</a>";

            } catch (e) {
                document.getElementById("result").innerHTML =
                    "❌ Invalid URL";
            }
        }
    </script>

</body>
</html>
